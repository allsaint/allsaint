<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Stock • Pharmacy</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_stock.css') }}">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="container-fluid d-flex justify-content-between align-items-center px-4">
        <h2 class="module-title">
            <i class="bi bi-plus-circle me-2"></i>Add Drug Stock
        </h2>
        <a href="{{ url_for('pharmacy_dashboard') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
</div> 

<!-- Main Content -->
<div class="container form-container">

    <!-- Feedback Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Add Stock Form -->
    <div class="card stock-card">
        <div class="card-body">

            <h4 class="card-title mb-4">Drug Information</h4>

            <form method="POST" action="{{ url_for('add_stock') }}">

                <div class="mb-3">
                    <label class="form-label">Drug Name</label>
                    <input
                        type="text"
                        name="drug_name"
                        class="form-control"
                        placeholder="e.g. Paracetamol"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Strength</label>
                    <input
                        type="text"
                        name="strength"
                        class="form-control"
                        placeholder="e.g. 500mg"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Unit Price (₦)</label>
                    <input
                        type="number"
                        step="0.01"
                        name="unit_price"
                        class="form-control"
                        placeholder="e.g. 150.00"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity Added</label>
                    <input
                        type="number"
                        name="quantity"
                        class="form-control"
                        placeholder="e.g. 100"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">Expiry Date</label>
                    <input
                        type="date"
                        name="expiry_date"
                        class="form-control"
                        required
                    >
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Add Stock
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
